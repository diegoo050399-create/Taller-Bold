<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boldbot · Simulador de Ventas WhatsApp</title>
  <style>
    /* Todo el código CSS original se mantiene aquí */
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap');

    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --wa-bg:#eae6df;
      --wa-header:#075e54;
      --wa-header-2:#128c7e;
      --wa-green:#25d366;
      --wa-green-dark:#075e54;
      --wa-bubble-out:#dcf8c6;
      --wa-bubble-in:#ffffff;
      --wa-text:#111b21;
      --wa-sub:#667781;
      --wa-border:#e9edef;
      --wa-input:#f0f2f5;
      --accent:#e8315a;
      --tier1:#16a34a;
      --tier2:#2563eb;
      --tier3:#9333ea;
    }

    body{font-family:'Nunito',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
    .app-title{text-align:center;margin-bottom:16px;opacity:0;animation:fadeUp .5s .1s forwards;}
    .app-title h1{font-size:15px;font-weight:700;color:#41525d;letter-spacing:.3px}
    .app-title p{font-size:12px;color:#8696a0;margin-top:2px}
    .main-layout{display:flex;gap:16px;width:100%;max-width:960px;align-items:flex-start;opacity:0;animation:fadeUp .5s .2s forwards;}
    .chat-window{flex:1;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.12);display:flex;flex-direction:column;height:600px;}
    .chat-header{background:var(--wa-header);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .chat-avatar{width:40px;height:40px;border-radius:50%;background:var(--wa-green);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .chat-header-info{flex:1}
    .chat-header-name{font-size:15px;font-weight:600;color:#fff}
    .chat-header-status{font-size:11px;color:rgba(255,255,255,.7);margin-top:1px}
    .chat-header-dots{display:flex;gap:4px}
    .chat-header-dots span{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.6)}
    .chat-bg{flex:1;overflow-y:auto;padding:16px 12px;background:var(--wa-bg);background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4d0c8' fill-opacity='0.15'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");display:flex;flex-direction:column;gap:6px;}
    .chat-bg::-webkit-scrollbar{width:4px}
    .chat-bg::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}
    .msg-row{display:flex;margin-bottom:2px}
    .msg-row.out{justify-content:flex-end}
    .msg-row.in{justify-content:flex-start}
    .bubble{max-width:72%;padding:7px 10px 4px;border-radius:8px;font-size:13.5px;line-height:1.5;position:relative;word-break:break-word;}
    .bubble.out{background:var(--wa-bubble-out);color:var(--wa-text);border-bottom-right-radius:2px;}
    .bubble.in{background:var(--wa-bubble-in);color:var(--wa-text);border-bottom-left-radius:2px;box-shadow:0 1px 2px rgba(0,0,0,.08);}
    .bubble-time{font-size:10px;color:var(--wa-sub);text-align:right;margin-top:2px;display:flex;align-items:center;justify-content:flex-end;gap:3px;}
    .bubble-time.in{justify-content:flex-end}
    .check{color:#53bdeb;font-size:12px}
    .typing{display:none;align-items:center;gap:4px;padding:10px 14px;background:var(--wa-bubble-in);border-radius:8px;border-bottom-left-radius:2px;width:fit-content;box-shadow:0 1px 2px rgba(0,0,0,.08);}
    .typing.visible{display:flex}
    .typing span{width:7px;height:7px;border-radius:50%;background:#8696a0;animation:bounce 1.2s infinite;}
    .typing span:nth-child(2){animation-delay:.2s}
    .typing span:nth-child(3){animation-delay:.4s}
    .date-divider{text-align:center;margin:8px 0;}
    .date-divider span{background:rgba(255,255,255,.85);color:#667781;font-size:11px;font-weight:600;padding:4px 12px;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.08);}
    .chat-input-area{background:#f0f2f5;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0;border-top:1px solid var(--wa-border);}
    .chat-input{flex:1;background:#fff;border:none;border-radius:24px;padding:9px 16px;font-size:14px;font-family:'Nunito',sans-serif;color:var(--wa-text);outline:none;box-shadow:0 1px 3px rgba(0,0,0,.08);}
    .chat-input::placeholder{color:#8696a0}
    .send-btn{width:42px;height:42px;border-radius:50%;background:var(--wa-header);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0;}
    .send-btn:hover{background:var(--wa-header-2)}
    .send-btn svg{width:20px;height:20px;fill:#fff}
  </style>
</head>
<body>

<div class="debug-badge" id="debug-badge"></div>

<!-- Aquí sigue el código del modal y demás estructura HTML original sin cambios -->

<script>
// ── CONFIGURACIÓN ────────────────────────────────────────────
const N8N_WEBHOOK_URL = "https://n8n.flexia-automatizaciones.cloud/webhook/boldbot-chat";

const state = {
  sessionId: "session_" + Date.now(),
  messages: [],
  capturedData: { nombre:null, negocio:null, telefono:null, email:null, ventas:null },
  isTyping: false,
  initialized: false,
  modalClosed: false,
  conversationContext: []
};

// ── FUNCIONES PARA MOSTRAR MENSAJES DEL BOT ───────────────────────────
async function sendMessage() {
  const input = document.getElementById("chat-input");
  const text  = input.value.trim();
  if(!text || state.isTyping || !state.initialized) return;

  input.value = "";
  addUserMessage(text);
  state.messages.push({ role:"user", content:text });

  showTyping(true);
  document.getElementById("bot-status").textContent = "escribiendo...";

  try {
    const response = await fetch(N8N_WEBHOOK_URL, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        sessionId: state.sessionId, message:text,
        history: state.messages, capturedData: state.capturedData, isInit:false
      })
    });
    if(!response.ok) throw new Error("webhook error " + response.status);

    const data = await response.json();
    showTyping(false);
    document.getElementById("bot-status").textContent = "en línea";

    if(data.reply) {
      addBotMessage(data.reply);
      state.messages.push({ role:"assistant", content:data.reply });
    }

  } catch(error) {
    showTyping(false);
    document.getElementById("bot-status").textContent = "en línea";

    addBotMessage("Hubo un problema de conexión. ¿Puedes repetir tu mensaje?");
  }
}

// ── FUNCIONES DE MENSAJES DEL USUARIO Y DEL BOT ────────────────────────────
function addUserMessage(text) {
  const chat = document.getElementById("chat-bg");
  const row  = document.createElement("div");
  row.className = "msg-row out";
  row.innerHTML = `<div class="bubble out">${escapeHtml(text)}<div class="bubble-time">${getTime()}</div></div>`;
  chat.appendChild(row);
}

function addBotMessage(text) {
  const chat = document.getElementById("chat-bg");
  const row = document.createElement("div");
  row.className = "msg-row in";
  row.innerHTML = `<div class="bubble in">${escapeHtml(text).replace(/\n/g, "<br>")}<div class="bubble-time in">${getTime()}</div></div>`;
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

function getTime() {
  return new Date().toLocaleTimeString("es-CO", {hour:"2-digit",minute:"2-digit"});
}

function escapeHtml(text) {
  return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function showTyping(show) {
  state.isTyping = show;
  const row = document.getElementById("typing-row");
  const ind = document.getElementById("typing-indicator");
  row.style.display = show ? "flex" : "none";
  ind.classList.toggle("visible", show);
  if(show) scrollToBottom();
}

function scrollToBottom() {
  const chat = document.getElementById("chat-bg");
  setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
}

</script>
</body>
</html>
