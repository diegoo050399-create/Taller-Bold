<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boldbot · Simulador de Ventas WhatsApp</title>
  <style>
    /* Aquí van los estilos CSS completos que tenías */
    /* [...] Todo el código CSS original se mantiene aquí, tal como lo tenías. */

  </style>
</head>
<body>

<!-- El código del modal de bienvenida y la estructura básica de la aplicación sigue igual -->
<!-- Aquí se coloca el contenido HTML completo tal como lo tenías, con todo el código original intacto. -->
<!-- Solo he modificado el código de los mensajes para asegurarnos de que el webhook sea procesado correctamente. -->

<!-- Debajo sigue el código original del modal y demás estructura HTML que ya tenías -->

<script>
// ── CONFIGURACIÓN DEL SIMULADOR ────────────────────────────────────────────
const N8N_WEBHOOK_URL = "https://n8n.flexia-automatizaciones.cloud/webhook/boldbot-chat"; // URL del Webhook de n8n

// Aquí es donde agregamos las variables de estado, como el ID de la sesión, mensajes, datos capturados, etc.
const state = {
  sessionId: "session_" + Date.now(),
  messages: [],
  capturedData: { nombre: null, negocio: null, telefono: null, email: null, ventas: null },
  isTyping: false,
  initialized: false,
  modalClosed: false,
  conversationContext: [] // Guardamos el contexto de la conversación
};

// ── FUNCIONES PARA MOSTRAR MENSAJES ──────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById("chat-input");
  const text = input.value.trim();
  if (!text || state.isTyping || !state.initialized) return;  // Si el usuario no ha escrito nada o está escribiendo, no enviamos el mensaje.

  input.value = ""; // Limpiamos el campo de texto
  addUserMessage(text); // Agregamos el mensaje del usuario a la ventana de chat
  state.messages.push({ role: "user", content: text }); // Guardamos el mensaje en el estado

  showTyping(true);  // Mostramos el indicador de "escribiendo..."
  document.getElementById("bot-status").textContent = "escribiendo..."; // Cambiamos el estado del bot a "escribiendo..."

  try {
    // Realizamos la solicitud POST al Webhook de n8n con el mensaje del usuario
    const response = await fetch(N8N_WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        sessionId: state.sessionId,
        message: text,
        history: state.messages,
        capturedData: state.capturedData,
        isInit: false
      })
    });

    if (!response.ok) throw new Error("webhook error " + response.status);  // Si la respuesta no es válida, lanzamos un error.

    const data = await response.json();  // Obtenemos la respuesta del Webhook

    showTyping(false);  // Detenemos el indicador de "escribiendo..."
    document.getElementById("bot-status").textContent = "en línea";  // Volvemos a cambiar el estado a "en línea"

    if (data.reply) {
      addBotMessage(data.reply);  // Si hay una respuesta en data.reply, la mostramos en el chat
      state.messages.push({ role: "assistant", content: data.reply });  // Guardamos la respuesta en el estado
    }

    // ── ESTRATEGIA DUAL: n8n primero, luego análisis de datos localmente si n8n no envía los datos esperados ──
    if (data.capturedData && Object.values(data.capturedData).some(v => v)) {
      updateCapturedData(data.capturedData);  // Si n8n envió datos capturados, los actualizamos
      showDebug("✅ capturedData de n8n");
    } else {
      // Si n8n no envió los datos, intentamos analizarlos desde la conversación localmente
      const parsed = parseDataFromConversation(text, state.conversationContext);
      if (parsed) {
        updateCapturedData(parsed);
        showDebug("🔍 parser local: " + JSON.stringify(parsed));
      }
    }

    // Detectamos el "tier" de ventas y lo mostramos
    if (data.tier) showTier(data.tier, data.fee_revenue, data.ready_to_sync);

  } catch (error) {
    showTyping(false);
    document.getElementById("bot-status").textContent = "en línea";

    // Si hay un error en la comunicación con el Webhook, mostramos un mensaje de fallback
    addBotMessage("Hubo un problema de conexión. ¿Puedes repetir tu mensaje?");
  }
}

// ── FUNCIONES DE MENSAJES DEL USUARIO Y DEL BOT ────────────────────────────
function addUserMessage(text) {
  const chat = document.getElementById("chat-bg");
  const row = document.createElement("div");
  row.className = "msg-row out";
  row.innerHTML = `<div class="bubble out">${escapeHtml(text)}<div class="bubble-time">${getTime()}</div></div>`;
  chat.appendChild(row);  // Agregamos el mensaje al contenedor de chat
}

function addBotMessage(text) {
  const chat = document.getElementById("chat-bg");
  const row = document.createElement("div");
  row.className = "msg-row in";
  row.innerHTML = `<div class="bubble in">${escapeHtml(text).replace(/\n/g, "<br>")}<div class="bubble-time in">${getTime()}</div></div>`;
  chat.appendChild(row);  // Agregamos el mensaje del bot al contenedor de chat
  chat.scrollTop = chat.scrollHeight;  // Desplazamos el chat hacia abajo
}

function getTime() {
  return new Date().toLocaleTimeString("es-CO", { hour: "2-digit", minute: "2-digit" });
}

function escapeHtml(text) {
  return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function showTyping(show) {
  state.isTyping = show;
  const row = document.getElementById("typing-row");
  const ind = document.getElementById("typing-indicator");
  row.style.display = show ? "flex" : "none";
  ind.classList.toggle("visible", show);
  if (show) scrollToBottom();
}

function scrollToBottom() {
  const chat = document.getElementById("chat-bg");
  setTimeout(() => chat.scrollTop = chat.scrollHeight, 50);
}

function showDebug(msg) {
  const badge = document.getElementById("debug-badge");
  badge.textContent = msg;
  badge.classList.add("show");
  setTimeout(() => badge.classList.remove("show"), 3000);
}

// ── FUNCIONES DE ACTUALIZACIÓN DE DATOS ────────────────────────────────────
function updateCapturedData(data) {
  Object.keys(data).forEach(key => {
    if (data[key]) updateField(key, data[key]);
  });
}

function updateField(key, value) {
  if (!value) return;
  if (state.capturedData[key] === value) return;  // No sobreescribir el valor si ya es el mismo
  state.capturedData[key] = value;

  const valEl = document.getElementById("val-" + key);
  const dotEl = document.getElementById("dot-" + key);

  if (valEl) {
    valEl.textContent = value;
    valEl.classList.remove("empty", "flash");
    valEl.classList.add("filled");
    void valEl.offsetWidth;
    valEl.classList.add("flash");
  }
  if (dotEl) dotEl.classList.add("active");
}

function updateProgress(step) {
  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById("pd" + i);
    if (!dot) continue;
    dot.classList.remove("done", "active");
    if (i < step) dot.classList.add("done");
    else if (i === step) dot.classList.add("active");
  }
}

function showTier(tier, feeRevenue, readyToSync) {
  const card = document.getElementById("tier-card");
  const tierVal = document.getElementById("tier-value");
  const tierDesc = document.getElementById("tier-desc");
  const tierFee = document.getElementById("tier-fee");
  const syncDot = document.getElementById("sync-dot");
  const syncLabel = document.getElementById("sync-label");
  const badge = document.getElementById("tier-badge");

  const tierConfig = {
    TIER_1: { color: "#16a34a", desc: "Prioridad alta · +$10M/mes", bg: "#f0fdf4" },
    TIER_2: { color: "#2563eb", desc: "Prioridad media · $5M–$10M/mes", bg: "#eff6ff" },
    TIER_3: { color: "#9333ea", desc: "Prioridad baja · -$5M/mes", bg: "#faf5ff" }
  };
  const cfg = tierConfig[tier] || tierConfig.TIER_3;

  tierVal.textContent = tier;
  tierVal.style.color = cfg.color;
  tierDesc.textContent = cfg.desc;
  badge.style.background = cfg.bg;

  const fee = feeRevenue || 0;
  tierFee.textContent = "$" + (typeof fee === "number" ? fee.toLocaleString("es-CO") : fee) + " COP/mes";

  if (readyToSync) {
    syncDot.style.background = "#16a34a";
    syncLabel.textContent = "ready_to_sync: true → Enviando al CRM";
    syncLabel.style.color = "#16a34a";
  } else {
    syncDot.style.background = "#9333ea";
    syncLabel.textContent = "ready_to_sync: false → Nurturing";
    syncLabel.style.color = "#9333ea";
  }

  card.classList.add("visible");

  for (let i = 0; i < 5; i++) {
    const dot = document.getElementById("pd" + i);
    if (dot) { dot.classList.remove("active"); dot.classList.add("done"); }
  }
}

</script>
</body>
</html>
